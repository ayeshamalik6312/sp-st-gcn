# preprocessing
split_seed: 1951
split_size: 0.2
val_size: 0.1
adjacency_threshold: 1e-1
adjacency_sigma: 1.0

# model
hidden_dim: 128
latent_dim: 32
tau: 0.5
dropout_rate: 0.2

# training
n_epochs: 300
lr: 1e-4
l2_lambda: 1e-4
patience: 20

# loss weights
loss_alpha: 0.5
loss_beta: 0.2
loss_gamma: 0.0
loss_delta: 0.9

# Marker gene settings
n_markers_per_type: 5
marker_weight: 1.8
use_weighted_recon: true

# Sparsity settings  
sparsity_weight: 0.015
sparsity_type: "entropy"  # "l1", "entropy", or "both"
target_entropy: 2.0  # Target entropy for ~3 dominant cell types

# Pseudo-spot settings
use_pseudo_spots: true
pseudo_n_spots: 4000
pseudo_max_types: 3
pseudo_noise_sigma: 0.1
pseudo_dirichlet_alpha: 1.0
pseudo_recon_weight: 0.5      
pseudo_supervise_weight: 2.0  
pseudo_seed: 42

# visualization
# plot_sets: ["train", "val", "test", "all"]   # options: any subset of ["train", "val", "test", "all"]
plot_sets: [""]   # options: any subset of ["train", "val", "test", "all"]
